name: security

on:
  pull_request:

permissions:
  contents: read

jobs:
  secrets:
    name: Secretlint Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Secretlint
        run: bun run security:secrets
