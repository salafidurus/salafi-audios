name: db-migrate-neon

on:
  pull_request:
    paths:
      - packages/core-db/prisma/**
      - packages/core-db/prisma.config.ts
      - packages/core-db/package.json

concurrency:
  group: db-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

# Bun is the runtime; no Node.js version required

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read

    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build deps needed for typecheck
        run: bun run build --filter=@sd/core-db^...

      - name: Validate Prisma schema
        env:
          DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
        run: bun run --filter @sd/core-db prisma:validate

      - name: Apply migrations
        env:
          DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
        run: bun run --filter @sd/core-db migrate:deploy

      - name: Generate Prisma client
        env:
          DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
        run: bun run --filter @sd/core-db prisma:generate
