name: ci

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - preview
      - production
    # Skip CI for doc-only changes — no build/test impact
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "docs/**"
      - "AGENT.md"
      - "AGENTS.md"
      - ".github/copilot-instructions.md"

# Cancel stale runs on the same PR to save CI minutes on rapid pushes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  # Custom Playwright path enables GitHub Actions caching (default path is not cacheable)
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
  # Turbo Remote Cache credentials — shared cache across CI runs.
  # Empty on Dependabot runs (separate secret store); Turbo simply falls back to local cache.
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  # NOTE: jobs that run `prisma generate` fall back to a placeholder DB URL
  # ('postgresql://ci:ci@localhost:5432/ci') when secrets.DIRECT_DB_URL is empty — this happens
  # on Dependabot runs, which cannot read repo/environment secrets. `prisma generate` is pure
  # codegen and never connects, so the placeholder just satisfies prisma.config.ts's URL guard.

jobs:
  # Path-based change detection: downstream jobs only run when relevant files change
  changes:
    name: detect:changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      web_e2e: ${{ steps.filter.outputs.web_e2e }}
      db_generated_policy: ${{ steps.filter.outputs.db_generated_policy }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            # Any source/config change that affects build, lint, typecheck, or test.
            # A single filter now gates the consolidated `verify` job.
            code:
              - "apps/**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
              - "packages/**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}"
              - "tsconfig*.json"
              - "**/tsconfig*.json"
              - "eslint.config.*"
              - "**/eslint.config.*"
              - "jest.config.*"
              - "**/jest.config.*"
              # Prisma schema changes affect generated types/client used by typecheck and tests
              - "packages/core-db/prisma/**"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "package.json"
              - "**/package.json"
              - "turbo.json"
              - ".github/workflows/ci.yml"
            # apps/web plus the workspace packages it depends on (changes there can affect e2e)
            web_e2e:
              - "apps/web/**"
              - "packages/core-api/**"
              - "packages/core-contracts/**"
              - "packages/core-i18n/**"
              - "packages/design-tokens/**"
              - "packages/domain-account/**"
              - "packages/domain-audio/**"
              - "packages/domain-content/**"
              - "packages/domain-live/**"
              - "packages/domain-search/**"
              - "packages/util-config/**"
              - "pnpm-workspace.yaml"
              - "turbo.json"
              - ".github/workflows/ci.yml"
            # Catches accidental commits of generated Prisma client output
            db_generated_policy:
              - "packages/core-db/prisma/**"
              - "packages/core-db/prisma.config.ts"
              - "packages/core-db/src/generated/**"

  # Single consolidated check: one install, then build + lint + typecheck + test in one Turbo
  # run. `--continue` runs every task and surfaces all failures together (no early stop), and
  # Turbo parallelizes across the runner's cores by the task graph. Replaces the former
  # build_deps/lint/typecheck/test jobs and their artifact upload/download dance.
  verify:
    name: verify
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Maps PR target branch to the correct env for secrets (DB URLs differ per environment)
    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}
    # CI uses direct DB URL (no pooler) — DATABASE_URL alias needed for Prisma client generation.
    # Falls back to the placeholder when the secret is empty (Dependabot runs) so dep-bump PRs pass.
    env:
      DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      DATABASE_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history needed for dorny/paths-filter and turbo's --affected
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build, lint, typecheck, test
        run: pnpm turbo run build lint typecheck test --continue

  e2e_web:
    name: e2e:web
    needs: changes
    if: needs.changes.outputs.web_e2e == 'true'
    runs-on: ubuntu-latest
    # e2e builds the web app (and its workspace deps, incl. @sd/core-db codegen) itself now
    # that there's no shared build artifact, so it needs a DB URL for prisma generate.
    env:
      DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      DATABASE_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter web exec playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      # Cache Playwright browsers (~200MB) keyed by installed Playwright version to avoid
      # invalidation from unrelated changes while ensuring correct browser alignment
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps

      - name: Playwright cache diagnostics
        if: always()
        run: |
          echo "Cache key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version || 'unknown' }}"
          echo "Cache hit: ${{ steps.playwright-cache.outputs.cache-hit }}"
          pnpm --filter web exec playwright --version || echo "Playwright not in PATH"
          echo "Browser path: $PLAYWRIGHT_BROWSERS_PATH"
          ls -la "$PLAYWRIGHT_BROWSERS_PATH" 2>/dev/null || echo "Browser path does not exist (cache miss expected)"

      # Build web + its workspace deps (reuses Turbo remote cache from `verify` when tokens exist),
      # so Playwright can `pnpm start` the prebuilt app instead of building inside the test run.
      - name: Build web
        run: pnpm turbo run build --filter=web...

      - name: Run Playwright
        env:
          # Skip Next.js build inside Playwright — the app is already built above
          PW_SKIP_WEB_BUILD: "1"
        run: pnpm --filter web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report

  # Guardrail: generated Prisma client must never be committed to git.
  # It's regenerated at build time from the schema; stale checked-in output causes subtle bugs.
  db_generated_policy:
    name: db:generated-policy
    needs: changes
    if: needs.changes.outputs.db_generated_policy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}
    env:
      DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      DATABASE_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sd/core-db prisma:generate

      - name: Enforce generated DB artifact policy
        run: |
          if [ -n "$(git ls-files -- packages/core-db/src/generated)" ]; then
            echo "::error::Forbidden tracked files found in packages/core-db/src/generated"
            git ls-files -- packages/core-db/src/generated
            exit 1
          fi

          if [ -n "$(git status --porcelain --untracked-files=all -- packages/core-db/src/generated)" ]; then
            echo "::error::packages/core-db/src/generated must remain git-clean after generation"
            git status --porcelain --untracked-files=all -- packages/core-db/src/generated
            exit 1
          fi
