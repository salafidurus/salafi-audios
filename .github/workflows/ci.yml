name: ci

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - preview
      - production
    # Skip CI for doc-only changes — no build/test impact
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "docs/**"
      - "AGENT.md"
      - "AGENTS.md"
      - ".github/copilot-instructions.md"

# Cancel stale runs on the same PR to save CI minutes on rapid pushes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  # Custom Playwright path enables GitHub Actions caching (default path is not cacheable)
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
  # Turbo Remote Cache credentials — shared cache across CI runs
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  # Path-based change detection: downstream jobs only run when relevant files change
  changes:
    name: detect:changes
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      typecheck: ${{ steps.filter.outputs.typecheck }}
      test: ${{ steps.filter.outputs.test }}
      web_e2e: ${{ steps.filter.outputs.web_e2e }}
      db_generated_policy: ${{ steps.filter.outputs.db_generated_policy }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            lint:
              - "apps/**/*.{js,jsx,ts,tsx,mjs,cjs}"
              - "packages/**/*.{js,jsx,ts,tsx,mjs,cjs}"
              - "eslint.config.*"
              - "**/eslint.config.*"
            typecheck:
              - "apps/**/*.{ts,tsx,mts,cts}"
              - "packages/**/*.{ts,tsx,mts,cts}"
              - "tsconfig*.json"
              - "**/tsconfig*.json"
              # Prisma schema changes affect generated types used by typecheck
              - "packages/core-db/prisma/**"
            test:
              - "apps/**/*.{js,jsx,ts,tsx,mjs,cjs}"
              - "packages/**/*.{js,jsx,ts,tsx,mjs,cjs}"
              - "apps/**/*.{spec,test}.{js,jsx,ts,tsx,mjs,cjs}"
              - "packages/**/*.{spec,test}.{js,jsx,ts,tsx,mjs,cjs}"
              - "jest.config.*"
              - "**/jest.config.*"
              # Prisma schema changes can break tests that use generated client
              - "packages/core-db/prisma/**"
            web_e2e:
              - "apps/web/**"
              - "packages/api-client/**"
              - "packages/core-env/**"
              - "packages/core-i18n/**"
            # Catches accidental commits of generated Prisma client output
            db_generated_policy:
              - "packages/core-db/prisma/**"
              - "packages/core-db/prisma.config.ts"

  # Shared build step: builds once and uploads artifacts for lint/typecheck/e2e to avoid redundant builds
  build_deps:
    name: build:deps
    needs: changes
    # Only build if at least one downstream job needs the artifacts
    if: needs.changes.outputs.lint == 'true' || needs.changes.outputs.typecheck == 'true' || needs.changes.outputs.web_e2e == 'true'
    runs-on: ubuntu-latest
    # Maps PR target branch to the correct env for secrets (DB URLs differ per environment)
    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}
    # CI uses direct DB URL (no pooler) — DATABASE_URL alias needed for Prisma client generation
    env:
      DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
      DATABASE_URL: ${{ secrets.DIRECT_DB_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history needed for dorny/paths-filter and turbo's --affected
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (all)
        run: pnpm build

      # Upload compiled outputs so downstream jobs skip building
      - name: Upload build outputs
        uses: actions/upload-artifact@v7
        with:
          name: build-outputs
          if-no-files-found: error
          # .next contains hidden dirs (e.g., .next/cache) required for Next.js
          include-hidden-files: true
          path: |
            apps/api/dist/**
            apps/livestreams/dist/**
            apps/web/.next/**
            packages/*/dist/**

  lint:
    name: lint
    needs:
      - build_deps
      - changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-outputs

      - name: Lint
        run: pnpm turbo lint --continue

  typecheck:
    name: typecheck
    needs:
      - build_deps
      - changes
    if: needs.changes.outputs.typecheck == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}
    env:
      DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
      DATABASE_URL: ${{ secrets.DIRECT_DB_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-outputs

      - name: Typecheck
        run: pnpm turbo typecheck --continue

  test:
    name: test
    needs:
      # Tests run after typecheck passes — no point testing code with type errors
      - typecheck
      - changes
    if: needs.changes.outputs.test == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}
    env:
      DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
      DATABASE_URL: ${{ secrets.DIRECT_DB_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-outputs
          path: .

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm turbo test --continue

  e2e_web:
    name: e2e:web
    needs:
      - build_deps
      - changes
    if: needs.changes.outputs.web_e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Cache Playwright browsers (~200MB) keyed by apps/web/package.json to avoid
      # invalidation from unrelated lockfile changes while still catching Playwright bumps
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install --with-deps

      - name: Playwright cache diagnostics
        if: always()
        run: |
          echo "Cache key: ${{ runner.os }}-playwright-${{ hashFiles('apps/web/package.json') }}"
          echo "Cache hit: ${{ steps.playwright-cache.outputs.cache-hit }}"
          pnpm --filter web exec playwright --version || echo "Playwright not in PATH"
          echo "Browser path: $PLAYWRIGHT_BROWSERS_PATH"
          ls -la "$PLAYWRIGHT_BROWSERS_PATH" 2>/dev/null || echo "Browser path does not exist (cache miss expected)"

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-outputs

      - name: Run Playwright
        env:
          # Skip Next.js build inside Playwright — reuse the artifact from build_deps
          PW_SKIP_WEB_BUILD: "1"
        run: pnpm --filter web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report

  # Guardrail: generated Prisma client must never be committed to git.
  # It's regenerated at build time from the schema; stale checked-in output causes subtle bugs.
  db_generated_policy:
    name: db:generated-policy
    needs: changes
    if: needs.changes.outputs.db_generated_policy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}
    env:
      DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sd/core-db prisma:generate

      - name: Enforce generated DB artifact policy
        run: |
          if [ -n "$(git ls-files -- packages/core-db/src/generated)" ]; then
            echo "::error::Forbidden tracked files found in packages/core-db/src/generated"
            git ls-files -- packages/core-db/src/generated
            exit 1
          fi

          if [ -n "$(git status --porcelain --untracked-files=all -- packages/core-db/src/generated)" ]; then
            echo "::error::packages/core-db/src/generated must remain git-clean after generation"
            git status --porcelain --untracked-files=all -- packages/core-db/src/generated
            exit 1
          fi
