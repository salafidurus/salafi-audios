name: ci

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "tsconfig*.json"
      - "**/tsconfig*.json"
      - "eslint.config.*"
      - "**/eslint.config.*"
      - "jest.config.*"
      - "**/jest.config.*"
      - "packages/core-db/prisma/**"
      - "bun.lock"
      - "package.json"
      - "**/package.json"
      - "turbo.json"
      - ".github/workflows/ci.yml"
      - "!**/*.md"

# Cancel stale runs on the same PR to save CI minutes on rapid pushes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Custom Playwright path enables GitHub Actions caching (default path is not cacheable)
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}
    env:
      DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      DATABASE_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Restore bun dependencies
        id: bun-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            .bun
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install
        if: steps.bun-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: Build, lint, typecheck, test
        run: turbo run build lint typecheck test --continue
