name: ci

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "tsconfig*.json"
      - "**/tsconfig*.json"
      - "**/eslint.config.*"
      - "jest.config.*"
      - "**/jest.config.*"
      - "packages/core-db/prisma/**"
      - "bun.lock"
      - "package.json"
      - "**/package.json"
      - "turbo.json"
      - ".github/workflows/ci.yml"
      - "!**/*.md"

# Cancel stale runs on the same PR to save CI minutes on rapid pushes
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Custom Playwright path enables GitHub Actions caching (default path is not cacheable)
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'preview' && 'preview' || github.base_ref == 'production' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Install without running lifecycle scripts to avoid exposing secrets
      # to untrusted package install code.
      - name: Install dependencies (scripts disabled)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run workspace postinstall
        run: bun run postinstall

      - name: Build, lint, typecheck, test
        env:
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL || 'http://localhost:3000' }}
          DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          DATABASE_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
        run: bun run turbo run build lint typecheck test --continue
