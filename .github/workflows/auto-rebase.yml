name: Auto-Rebase Deps PRs

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Update open dependency PRs
        run: |
          for pr in $(gh pr list --label "deps" --json number -q '.[].number'); do
            gh pr merge --auto --squash "$pr" 2>/dev/null || echo "PR #$pr: auto-merge already set or unavailable"
            if gh pr update-branch "$pr" 2>/dev/null; then
              echo "PR #$pr: rebased"
            else
              gh pr comment "$pr" --body "Auto-rebase conflict — manual intervention needed"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
