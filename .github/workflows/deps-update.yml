name: Dependency Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency: deps-update

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install (scripts disabled)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run workspace postinstall
        run: bun run postinstall

      - name: Restore deps state cache
        id: cache-restore
        uses: actions/cache@v6
        with:
          path: .cache/deps-state.json
          key: deps-state-${{ github.run_id }}
          restore-keys: |
            deps-state-

      - name: Run dependency update
        run: bun run pkg-update:ci
        env:
          GH_TOKEN: ${{ secrets.SALAFIDURUS_PR_WRITE }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Save deps state cache
        uses: actions/cache/save@v6
        if: always()
        with:
          path: .cache/deps-state.json
          key: deps-state-${{ github.run_id }}
