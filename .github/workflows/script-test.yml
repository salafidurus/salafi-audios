name: script-test

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/deploy/**"
      - "scripts/utils/**"
      - "scripts/postinstall.mjs"
      - ".github/workflows/script-test.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"

concurrency:
  group: script-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-deploy-scripts:
    name: Verify Deploy Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install Monorepo Dependencies
        run: bun install --frozen-lockfile

      - name: Run Deploy Script Unit Tests
        run: bun test scripts/deploy/install.spec.mjs

      - name: Verify Web Deploy Install Script
        run: bun ./scripts/deploy/install.mjs web

      - name: Verify Web Deploy Build Script
        run: bun ./scripts/deploy/build.mjs web
