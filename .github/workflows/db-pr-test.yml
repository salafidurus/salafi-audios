name: db-pr-test

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches:
      - main # Only PRs targeting main branch
    paths:
      - packages/core-db/prisma/**
      - packages/core-db/prisma.config.ts
      - packages/core-db/package.json
      - packages/core-db/src/generated/**

concurrency:
  group: db-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # Required for schema diff comments

jobs:
  setup:
    name: Setup
    outputs:
      branch: ${{ steps.branch_name.outputs.current_branch }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v9

  validate_and_migrate:
    name: Create Branch & Validate Schema & Run Migrations
    needs: setup
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Set branch expiration (14 days)
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon Branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

      - name: Validate Neon Connection
        run: |
          if [ -z "${{ steps.create_neon_branch.outputs.db_url }}" ]; then
            echo "::error::Neon branch database URL is empty"
            echo "This likely means the Neon branch creation failed."
            echo "Please verify:"
            echo "  1. NEON_PROJECT_ID is set in GitHub Settings → Variables"
            echo "  2. NEON_API_KEY is set in GitHub Settings → Secrets"
            exit 1
          fi
          echo "Neon branch created successfully"
          echo "Branch ID: ${{ steps.create_neon_branch.outputs.branch_id }}"

      # Install without running lifecycle scripts to avoid exposing secrets
      # to untrusted package install code.
      - name: Install dependencies (scripts disabled)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run workspace postinstall
        run: bun run postinstall

      - name: Build deps needed for typecheck
        run: bun run build --filter=@sd/core-db^...

      - name: Validate Prisma schema
        env:
          DIRECT_DB_URL: ${{ steps.create_neon_branch.outputs.db_url }}
        run: bun run --filter @sd/core-db prisma:validate

      - name: Apply migrations to Neon branch
        env:
          DIRECT_DB_URL: ${{ steps.create_neon_branch.outputs.db_url }}
        run: bun run --filter @sd/core-db migrate:deploy

      - name: Generate Prisma client
        env:
          DIRECT_DB_URL: ${{ steps.create_neon_branch.outputs.db_url }}
        run: bun run --filter @sd/core-db prisma:generate

  policy_check:
    name: Enforce Generated Artifact Policy
    needs: [setup, validate_and_migrate]
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      # Use fallback DB for policy check (doesn't need real DB)
      DIRECT_DB_URL: postgresql://ci:ci@localhost:5432/ci
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies (scripts disabled)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run workspace postinstall
        run: bun run postinstall

      - name: Generate Prisma client
        run: bun run --filter @sd/core-db prisma:generate

      - name: Enforce generated DB artifact policy
        run: |
          if [ -n "$(git ls-files -- packages/core-db/src/generated)" ]; then
            echo "::error::Forbidden tracked files found in packages/core-db/src/generated"
            git ls-files -- packages/core-db/src/generated
            exit 1
          fi

          if [ -n "$(git status --porcelain --untracked-files=all -- packages/core-db/src/generated)" ]; then
            echo "::error::packages/core-db/src/generated must remain git-clean after generation"
            git status --porcelain --untracked-files=all -- packages/core-db/src/generated
            exit 1
          fi

  schema_diff:
    name: Post Schema Diff to PR
    needs: [setup, validate_and_migrate]
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Post Schema Diff Comment
        uses: neondatabase/schema-diff-action@v1
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          compare_branch: preview/pr-${{ github.event.pull_request.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}

  delete_neon_branch:
    name: Delete Neon Branch
    needs: [setup, validate_and_migrate, policy_check, schema_diff]
    if: always() && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.pull_request.number }}-${{ needs.setup.outputs.branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
