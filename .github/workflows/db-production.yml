name: db-production

on:
  push:
    branches:
      - preview # Preview environment deployments
      - production # Production environment deployments
    paths:
      - packages/core-db/prisma/**
      - packages/core-db/prisma.config.ts
      - packages/core-db/package.json

concurrency:
  group: db-deploy-${{ github.ref_name }}
  cancel-in-progress: false # Never cancel in-progress migrations

permissions:
  contents: read

jobs:
  migrate:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }} # Dynamically select environment (preview or production)
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Install without running lifecycle scripts to avoid exposing secrets
      # to untrusted package install code.
      - name: Install dependencies (scripts disabled)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build deps needed for typecheck
        run: bun run build --filter=@sd/core-db^...

      - name: Validate Prisma schema
        env:
          DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
        run: bun run --filter @sd/core-db prisma:validate

      - name: Apply migrations to ${{ github.ref_name }}
        env:
          DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
        run: bun run --filter @sd/core-db migrate:deploy

      - name: Generate Prisma client
        env:
          DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL }}
        run: bun run --filter @sd/core-db prisma:generate
