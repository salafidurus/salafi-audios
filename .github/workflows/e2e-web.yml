name: e2e-web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/core-api/**"
      - "packages/core-contracts/**"
      - "packages/core-i18n/**"
      - "packages/design-tokens/**"
      - "packages/domain-account/**"
      - "packages/domain-audio/**"
      - "packages/domain-content/**"
      - "packages/domain-search/**"
      - "tsconfig.base.json"
      - "tsconfig.packages.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/e2e-web.yml"

# Cancel stale runs on the same PR to save CI minutes on rapid pushes
concurrency:
  group: e2e-web-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Custom Playwright path enables GitHub Actions caching (default path is not cacheable)
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  e2e_web:
    name: e2e:web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # Install without running lifecycle scripts to avoid exposing secrets
      # to untrusted package install code.
      - name: Install dependencies (scripts disabled)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run workspace postinstall
        run: bun run postinstall

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun run --filter web playwright:version | grep ^Version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      # Cache Playwright browsers (~200MB) keyed by installed Playwright version to avoid
      # invalidation from unrelated changes while ensuring correct browser alignment
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bun run --filter web playwright:install

      - name: Playwright cache diagnostics
        if: always()
        run: |
          echo "Cache key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version || 'unknown' }}"
          echo "Cache hit: ${{ steps.playwright-cache.outputs.cache-hit }}"
          bun run --filter web playwright:version || echo "Playwright not in PATH"
          echo "Browser path: $PLAYWRIGHT_BROWSERS_PATH"
          ls -la "$PLAYWRIGHT_BROWSERS_PATH" 2>/dev/null || echo "Browser path does not exist"

      # Build web + its workspace deps (reuses Turbo remote cache from `verify` when tokens exist),
      # so Playwright can `bun run start` the prebuilt app instead of building inside the test run.
      - name: Build web
        env:
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
        run: bun run turbo run build --filter=web...

      - name: Run Playwright
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
          NEXT_PUBLIC_WEB_URL: ${{ secrets.NEXT_PUBLIC_WEB_URL || 'http://localhost:3000' }}
          DIRECT_DB_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          DATABASE_URL: ${{ secrets.DIRECT_DB_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
          # Skip Next.js build inside Playwright — the app is already built above
          PW_SKIP_WEB_BUILD: "1"
        run: bun run --filter web test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report
