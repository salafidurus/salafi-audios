packages:
  - apps/*
  - packages/*

catalog:
  i18next: ^26.3.1
  react-hook-form: ^7.78.0
  react-i18next: ^15.5.3

# Allowlist of native packages that need post-install build steps.
# All other native deps are skipped for faster installs — add here only if builds fail.
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/engines"
  - "@scarf/scarf"
  - "@sentry/cli"
  - esbuild
  - prisma
  - sharp
  - unrs-resolver
